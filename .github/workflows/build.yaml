name: Deploy Appliaction on EC2 instance

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
      
jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set version tag
        id: set_tag
        run: echo "tag=v${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build & Push to Docker Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            aniketjok/fashion:${{ steps.set_tag.outputs.tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      TAG: ${{ needs.build.outputs.image_tag }}

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull aniketjok/fashion:${{ env.TAG }}
            sudo docker stop fashion || true
            sudo docker rm fashion || true
            sudo docker run -d -p 80:80 --name fashion aniketjok/fashion:${{ env.TAG }}
            # sudo docker image prune -a --filter "until=24h" -f

          
